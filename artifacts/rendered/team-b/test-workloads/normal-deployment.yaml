apiVersion: apps/v1
kind: Deployment
metadata:
  name: normal-workload
  namespace: team-b
  labels:
    app: normal-workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: normal-workload
  template:
    metadata:
      labels:
        app: normal-workload
    spec:
      containers:
        - name: app
          image: busybox:1.36.1
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 256Mi
